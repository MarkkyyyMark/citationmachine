name: CI

# Run the test suite on every push and PR so a broken change can't reach the
# deployed prototype unnoticed. The suite is offline (no API key needed) — it
# exercises the pure helpers, schema caps, and degraded paths.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q
